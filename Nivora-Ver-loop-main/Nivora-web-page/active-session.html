<!-- Nivora - Active Session -->
<!DOCTYPE html>

<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Nivora - Active Session</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Noto+Serif:ital,wght@0,400;0,500;0,600;0,700;1,600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="css/voice-states.css" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary": "#002c71",
                        "inverse-surface": "#e5e2e1",
                        "tertiary-fixed": "#ffdbd0",
                        "inverse-on-surface": "#303030",
                        "on-secondary": "#2a3138",
                        "inverse-primary": "#1357c9",
                        "surface-container-lowest": "#0e0e0e",
                        "on-secondary-fixed": "#151c23",
                        "on-tertiary-fixed-variant": "#7a2f15",
                        "on-secondary-fixed-variant": "#41484f",
                        "on-tertiary": "#5c1902",
                        "primary-container": "#0051c3",
                        "tertiary": "#ffb59e",
                        "primary": "#b1c5ff",
                        "error-container": "#93000a",
                        "surface-tint": "#b1c5ff",
                        "secondary": "#c0c7d0",
                        "on-secondary-container": "#b2b9c1",
                        "on-primary-fixed": "#001947",
                        "on-error-container": "#ffdad6",
                        "surface-container-high": "#2a2a2a",
                        "outline-variant": "#434653",
                        "on-background": "#e5e2e1",
                        "error": "#ffb4ab",
                        "surface-container-highest": "#353535",
                        "primary-fixed": "#dae2ff",
                        "surface-container": "#202020",
                        "background": "#131313",
                        "on-primary-fixed-variant": "#00419f",
                        "tertiary-fixed-dim": "#ffb59e",
                        "on-tertiary-container": "#ffc1ae",
                        "outline": "#8d909f",
                        "on-surface": "#e5e2e1",
                        "secondary-fixed": "#dce3ec",
                        "primary-fixed-dim": "#b1c5ff",
                        "on-primary-container": "#beceff",
                        "surface": "#131313",
                        "surface-bright": "#393939",
                        "secondary-container": "#434a51",
                        "secondary-fixed-dim": "#c0c7d0",
                        "surface-dim": "#131313",
                        "on-error": "#690005",
                        "on-surface-variant": "#c3c6d6",
                        "surface-container-low": "#1b1c1c",
                        "surface-variant": "#353535",
                        "tertiary-container": "#914024",
                        "on-tertiary-fixed": "#390b00"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .orb-glow {
            background: radial-gradient(circle, rgba(177,197,255,0.15) 0%, rgba(19,19,19,0) 70%);
        }
        .glass-panel {
            background: rgba(32, 32, 32, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden">
    <!-- Top Navigation Anchor -->
    <header class="w-full top-0 sticky flex justify-between items-center px-8 py-6 w-full bg-[#131313] z-50">
        <div class="flex items-center gap-3">
            <span class="font-['Noto_Serif'] text-2xl font-semibold text-[#B1C5FF] italic">Nivora</span>
            <div class="h-1 w-1 rounded-full bg-primary/40"></div>
            <span class="font-['Noto_Serif'] text-lg font-medium tracking-tight text-[#B1C5FF]">Active Session</span>
        </div>
        <div class="flex items-center gap-6">
            <button class="text-gray-400 hover:bg-[#202020] transition-colors duration-500 p-2 rounded-full">
                <span class="material-symbols-outlined" data-icon="graphic_eq">graphic_eq</span>
            </button>
            <button class="text-gray-400 hover:bg-[#202020] transition-colors duration-500 p-2 rounded-full">
                <span class="material-symbols-outlined" data-icon="settings">settings</span>
            </button>
        </div>
    </header>

    <main class="relative h-[calc(100vh-88px)] w-full flex flex-col items-center justify-center px-8">
        <!-- Ambient Atmosphere -->
        <div class="absolute inset-0 orb-glow pointer-events-none"></div>

        <!-- Main Content Area: The Living Orb -->
        <div class="relative z-10 flex flex-col items-center justify-center w-full max-w-4xl">
            <!-- Dynamic Waveform / Orb Container -->
            <div id="orb-container" class="relative w-80 h-80 flex items-center justify-center mb-16">
                <!-- Audio Canvas for Visualization -->
                <canvas id="audio-canvas" class="absolute inset-0 w-full h-full pointer-events-none"></canvas>
                <!-- Core Orb -->
                <div class="absolute w-48 h-48 rounded-full bg-gradient-to-br from-primary to-primary-container opacity-20 blur-2xl animate-pulse"></div>
                <div class="relative w-40 h-40 rounded-full border border-primary/20 flex items-center justify-center">
                    <div class="w-32 h-32 rounded-full border border-primary/40 flex items-center justify-center">
                    <div class="flex items-center gap-3 mb-4">
                        <!-- Pulsing Center -->
                        <div class="orb-core w-16 h-16 rounded-full bg-primary shadow-[0_0_40px_rgba(177,197,255,0.4)]"></div>
                    </div>
                </div>
                <!-- Floating Particle Decorations -->
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-full h-px bg-gradient-to-r from-transparent via-primary/20 to-transparent rotate-45 scale-150"></div>
                    <div class="w-full h-px bg-gradient-to-r from-transparent via-primary/10 to-transparent -rotate-45 scale-150"></div>
                </div>
            </div>

            <!-- Transcription Area -->
            <div id="transcription-area" class="text-center space-y-4 max-w-2xl px-6">
                <p id="transcription-text" class="font-headline text-2xl text-on-surface leading-relaxed italic opacity-90">
                    "Click the microphone to start talking with Nivora..."
                </p>
                <div id="voice-indicator" class="flex items-center justify-center gap-2">
                    <span class="w-1 h-1 rounded-full bg-primary/60"></span>
                    <span class="w-1 h-1 rounded-full bg-primary/60"></span>
                    <span class="w-1 h-1 rounded-full bg-primary/60"></span>
                </div>
            </div>
        </div>

        <!-- Vision PIP Window -->
        <div id="pip-video" class="absolute right-12 top-12 w-64 h-40 rounded-xl overflow-hidden shadow-[0px_8px_32px_rgba(0,0,0,0.4)] surface-container-low border border-outline-variant/10 group">
            <img alt="Vision Stream" class="w-full h-full object-cover" src="assets/anbalagan-profile.png"/>
            <div class="absolute top-3 left-3 flex items-center gap-2 px-2 py-1 glass-panel rounded-full text-[10px] font-medium tracking-widest uppercase">
                <span class="w-1.5 h-1.5 rounded-full bg-error animate-pulse"></span>
                Vision Live
            </div>
            <div class="absolute inset-0 bg-primary/10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                <span class="material-symbols-outlined text-white" data-icon="fullscreen">fullscreen</span>
            </div>
        </div>

        <!-- Mode Selection Sidebar (Subtle) -->
        <div class="absolute left-8 top-1/2 -translate-y-1/2 flex flex-col gap-8 items-center py-8 px-3 glass-panel rounded-full">
            <button class="text-primary" title="Warm Friend">
                <span class="material-symbols-outlined" data-icon="favorite" data-weight="fill" style="font-variation-settings: 'FILL' 1;">favorite</span>
            </button>
            <button class="text-gray-500 hover:text-white transition-colors" title="Professional">
                <span class="material-symbols-outlined" data-icon="work">work</span>
            </button>
            <button class="text-gray-500 hover:text-white transition-colors" title="Playful">
                <span class="material-symbols-outlined" data-icon="celebration">celebration</span>
            </button>
            <button class="text-gray-500 hover:text-white transition-colors" title="Analytical">
                <span class="material-symbols-outlined" data-icon="biotech">biotech</span>
            </button>
        </div>

        <!-- Floating Bottom Controls -->
        <div class="absolute bottom-12 flex items-center gap-4">
            <div class="glass-panel flex items-center gap-2 p-2 rounded-full border border-outline-variant/10">
                <button id="mic-btn" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-container transition-all">
                    <span class="material-symbols-outlined text-on-surface" data-icon="mic">mic</span>
                </button>
                <button id="videocam-btn" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-container transition-all">
                    <span class="material-symbols-outlined text-on-surface" data-icon="videocam">videocam</span>
                </button>
                <div class="w-px h-6 bg-outline-variant/20 mx-1"></div>
                <button id="end-session-btn" class="px-6 h-12 flex items-center gap-2 bg-gradient-to-r from-error/20 to-error/10 hover:from-error/30 hover:to-error/20 text-error rounded-full transition-all group" disabled>
                    <span class="material-symbols-outlined" data-icon="call_end" data-weight="fill" style="font-variation-settings: 'FILL' 1;">call_end</span>
                    <span class="font-medium">End Session</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Status Metadata Overlay -->
    <div id="status-overlay" class="fixed bottom-6 left-8 flex items-center gap-4 text-xs font-label text-outline tracking-wider uppercase">
        <div id="voice-status" class="flex items-center gap-1.5">
            <span class="w-1.5 h-1.5 rounded-full bg-primary/40"></span>
            Not connected
        </div>
        <div class="flex items-center gap-1.5">
            <span class="w-1.5 h-1.5 rounded-full bg-primary/40"></span>
            <span data-agent-state>Mode: Warm Friend</span>
        </div>
    </div>

    <!-- LiveKit SDK -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <!-- Nivora Voice Scripts -->
    <script src="js/nivora-voice.js"></script>
    <script src="js/audio-visualizer.js"></script>
    <script src="js/voice-ui.js"></script>
</body>
</html>
